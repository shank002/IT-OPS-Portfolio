# Netplan static IP configuration for LNX-DC01
# Place at: /etc/netplan/00-installer-config.yaml
# Apply with: sudo netplan apply
#
# Replace "ens18" with your actual NIC name (run: ip a)

network:
  version: 2
  ethernets:
    ens18:
      dhcp4: false
      addresses:
        - 192.168.10.11/24
      nameservers:
        addresses:
          - 127.0.0.1    # Samba internal DNS (self)
          - 8.8.8.8      # Fallback for internet resolution
        search:
          - linuxcorp.local
      routes:
        - to: default
          via: 192.168.10.1
